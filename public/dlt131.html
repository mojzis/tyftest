      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "4c6675358590a03c739c132652d6c5c7", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "7901b8cd55f637ee74bb0a9ea735c2aa", "console": [], "id": "MJUe", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "b5af3a402ff3930d60da5b8ba906ef82", "console": [], "id": "vblA", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "4df3a3595c3b53cb2a1755ab75bef108", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"what-this-is\"\u003EWhat this is\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003Etyf\u003C/code\u003E is a code-navigation CLI (symbol lookup \u2014 \u003Ccode\u003Efind\u003C/code\u003E, \u003Ccode\u003Eshow\u003C/code\u003E, \u003Ccode\u003Erefs\u003C/code\u003E) being\nevaluated for a permanent spot in Claude Code\u2019s \u003Ccode\u003ECLAUDE.md\u003C/code\u003E. To test whether it\nearns that standing context cost, we run the \u003Cstrong\u003Esame coding task\u003C/strong\u003E under two setups,\n\u003Cstrong\u003E5 repetitions each\u003C/strong\u003E, on Claude Opus in headless mode:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EA (control)\u003C/strong\u003E \u2014 no \u003Ccode\u003Etyf\u003C/code\u003E binary, no snippet.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ED (treatment)\u003C/strong\u003E \u2014 \u003Ccode\u003Etyf\u003C/code\u003E on PATH \u003Cstrong\u003Eplus\u003C/strong\u003E a \u003Ccode\u003ECLAUDE.md\u003C/code\u003E snippet telling the agent to use it.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThe task (\u003Ccode\u003Edlt-131\u003C/code\u003E) is a real reverted bug-fix from the \u003Ccode\u003Edlt\u003C/code\u003E library (PR #3431) \u2014\nthe agent sees the pre-fix code and a failing-test description but \u003Cstrong\u003Enever\u003C/strong\u003E the\nheld-out oracle tests that grade it (SWE-bench style). It\u2019s a ~100-step job\nspanning 8 files. Below we compare not just pass/fail but \u003Cstrong\u003Ehow\u003C/strong\u003E the agent worked,\nusing step-level data pulled live from the introspect log DB.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "fd83c02cd8c6f97cec6b78660c246f82", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"dlt-131-round-4-how-the-tyf-snippet-changes-agent-behavior\"\u003E\u003Ccode\u003Edlt-131\u003C/code\u003E (round 4) \u2014 how the \u003Ccode\u003Etyf\u003C/code\u003E snippet changes agent behavior\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EDesign.\u003C/strong\u003E dlt task \u003Ccode\u003Edlt-131\u003C/code\u003E, 5 reps \u00d7 2 conditions, opus-4.8.\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EA\u003C/strong\u003E = control (no \u003Ccode\u003Etyf\u003C/code\u003E snippet in CLAUDE.md)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ED\u003C/strong\u003E = treatment (\u003Ccode\u003Etyf\u003C/code\u003E snippet present)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThis is the round where treatment actually \u003Cstrong\u003Eused \u003Ccode\u003Etyf\u003C/code\u003E\u003C/strong\u003E (avg 4.6 calls/session).\nThe interesting result isn\u2019t pass/fail (0.6 vs 0.4 on n=5 is noise) \u2014 it\u2019s a\nclear \u003Cstrong\u003Ebehavioral shift\u003C/strong\u003E: with \u003Ccode\u003Etyf\u003C/code\u003E the agent reads less, edits less, burns\nfar less context, and finishes in fewer turns. Outcome rows come from the\nresults JSONL; the step-level data is pulled live from the \u003Cstrong\u003Eintrospect SQL API\u003C/strong\u003E\n(bd#93), joined on \u003Ccode\u003Esession_id\u003C/code\u003E.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "9db8e8eeeafb67e750524cea3efabe27", "console": [], "id": "PKri", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"the-behavioral-difference-mean-sd-per-session\"\u003EThe behavioral difference (mean \u00b1 sd per session)\u003C/h3\u003E\u003C/span\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EWith \u003Ccode\u003Etyf\u003C/code\u003E (D) the agent \u003Cstrong\u003Ereads 27% less, edits 35% less, and finishes in ~20% fewer turns\u003C/strong\u003E \u2014 it orients by symbol lookup instead of scanning files. The \u003Cstrong\u003ED / A\u003C/strong\u003E column is the ratio (\u0026lt; 1 = treatment does less); spreads are \u00b11 sd across the 5 reps. Note D isn\u2019t just lower, it\u2019s \u003Cstrong\u003Emore consistent\u003C/strong\u003E: Edit spread collapses \u00b17.7\u2192\u00b11.1 and Turns \u00b142\u2192\u00b117 \u2014 the same variance-narrowing the locate phase shows (tyf gives a steadier \u201clook it up, then edit\u201d rhythm). Oracle pass 0.6 vs 0.4 is n=5 noise; the behavior is the signal.\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-ui-element object-id='PKri-0' random-id='512a3b83-0c15-f78e-1119-0b4db3ea3f87'\u003E\u003Cmarimo-table data-initial-value='[]' data-label='null' data-data='\u0026quot;[{\u0026#92;\u0026quot;metric\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Sessions (n)\u0026#92;\u0026quot;,\u0026#92;\u0026quot;A  (control)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;5\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D  (treatment)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;5\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D / A\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026#92;u2014\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;metric\u0026#92;\u0026quot;:\u0026#92;\u0026quot;tyf calls / session\u0026#92;\u0026quot;,\u0026#92;\u0026quot;A  (control)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;0.0 \u0026#92;\u0026#92;u00b1 0.0\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D  (treatment)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;4.6 \u0026#92;\u0026#92;u00b1 2.6\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D / A\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026#92;u2014\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;metric\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Read calls / session\u0026#92;\u0026quot;,\u0026#92;\u0026quot;A  (control)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;18.8 \u0026#92;\u0026#92;u00b1 5.1\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D  (treatment)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;13.8 \u0026#92;\u0026#92;u00b1 3.8\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D / A\u0026#92;\u0026quot;:\u0026#92;\u0026quot;0.73\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;metric\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Edit calls / session\u0026#92;\u0026quot;,\u0026#92;\u0026quot;A  (control)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;14.4 \u0026#92;\u0026#92;u00b1 7.7\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D  (treatment)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;9.4 \u0026#92;\u0026#92;u00b1 1.1\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D / A\u0026#92;\u0026quot;:\u0026#92;\u0026quot;0.65\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;metric\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Bash calls / session\u0026#92;\u0026quot;,\u0026#92;\u0026quot;A  (control)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;63.8 \u0026#92;\u0026#92;u00b1 10.8\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D  (treatment)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;49.8 \u0026#92;\u0026#92;u00b1 10.5\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D / A\u0026#92;\u0026quot;:\u0026#92;\u0026quot;0.78\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;metric\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Turns / session\u0026#92;\u0026quot;,\u0026#92;\u0026quot;A  (control)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;80.0 \u0026#92;\u0026#92;u00b1 42.4\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D  (treatment)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;79.2 \u0026#92;\u0026#92;u00b1 17.1\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D / A\u0026#92;\u0026quot;:\u0026#92;\u0026quot;0.99\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;metric\u0026#92;\u0026quot;:\u0026#92;\u0026quot;Cost (USD) / session\u0026#92;\u0026quot;,\u0026#92;\u0026quot;A  (control)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;9.20 \u0026#92;\u0026#92;u00b1 3.07\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D  (treatment)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;6.49 \u0026#92;\u0026#92;u00b1 1.50\u0026#92;\u0026quot;,\u0026#92;\u0026quot;D / A\u0026#92;\u0026quot;:\u0026#92;\u0026quot;0.71\u0026#92;\u0026quot;}]\u0026quot;' data-total-rows='7' data-total-columns='4' data-max-columns='50' data-banner-text='\u0026quot;\u0026quot;' data-pagination='false' data-page-size='10' data-field-types='[[\u0026quot;metric\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;str\u0026quot;]],[\u0026quot;A  (control)\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;str\u0026quot;]],[\u0026quot;D  (treatment)\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;str\u0026quot;]],[\u0026quot;D / A\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;str\u0026quot;]]]' data-show-filters='true' data-show-download='true' data-show-search='true' data-show-column-summaries='false' data-show-data-types='true' data-show-page-size-selector='true' data-show-column-explorer='true' data-show-chart-builder='true' data-row-headers='[]' data-hidden-columns='[]' data-has-stable-row-id='false' data-lazy='false' data-preload='false'\u003E\u003C/marimo-table\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "30c8047ce846d522ccf23d78bedfd438", "console": [], "id": "Xref", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u00 0026quot;:{\u0026quot;anchor\u0026quot;:\u0026quot;x\u0026quot;,\u0026quot;domain\u0026quot;:[0.0,1.0],\u0026quot;title\u0026quot;:{\u0026quot;text\u0026quot;:\u0026quot;\u0026quot;}},\u0026quot;legend\u0026quot;:{\u0026quot;title\u0026quot;:{\u0026quot;text\u0026quot;:\u0026quot;\u0026quot;},\u0026quot;tracegroupgap\u0026quot;:0},\u0026quot;title\u0026quot;:{\u0026quot;text\u0026quot;:\u0026quot;tyf dose vs. outcome \u2014 D runs with \u22654 tyf calls all solved; \u22642 all failed\u0026quot;},\u0026quot;boxmode\u0026quot;:\u0026quot;overlay\u0026quot;,\u0026quot;shapes\u0026quot;:[{\u0026quot;line\u0026quot;:{\u0026quot;color\u0026quot;:\u0026quot;#888\u0026quot;,\u0026quot;dash\u0026quot;:\u0026quot;dash\u0026quot;},\u0026quot;type\u0026quot;:\u0026quot;line\u0026quot;,\u0026quot;x0\u0026quot;:3.5,\u0026quot;x1\u0026quot;:3.5,\u0026quot;xref\u0026quot;:\u0026quot;x\u0026quot;,\u0026quot;y0\u0026quot;:0,\u0026quot;y1\u0026quot;:1,\u0026quot;yref\u0026quot;:\u0026quot;y domain\u0026quot;}],\u0026quot;annotations\u0026quot;:[{\u0026quot;showarrow\u0026quot;:false,\u0026quot;text\u0026quot;:\u0026quot;dose threshold\u0026quot;,\u0026quot;x\u0026quot;:3.5,\u0026quot;xanchor\u0026quot;:\u0026quot;center\u0026quot;,\u0026quot;xref\u0026quot;:\u0026quot;x\u0026quot;,\u0026quot;y\u0026quot;:1,\u0026quot;yanchor\u0026quot;:\u0026quot;bottom\u0026quot;,\u0026quot;yref\u0026quot;:\u0026quot;y domain\u0026quot;}],\u0026quot;margin\u0026quot;:{\u0026quot;t\u0026quot;:60,\u0026quot;b\u0026quot;:30},\u0026quot;height\u0026quot;:340}}' data-config='{}'\u003E\u003C/marimo-plotly\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003ECaveat \u2014 n=5: this is a suggestive lead, not a result. The \u003Ccode\u003Efirst nav\u003C/code\u003E grep\u2192tyf flip is deterministic (5/5, robust), but the dose\u2192solve split rests on one or two runs per side; solve-rate p=1.00 at this N. Powering the effect needs ~13 reps/arm (see \u003Ccode\u003Edocs/learnings/tyf-significance-test.md\u003C/code\u003E).\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "ef7a884863743a591d4479ecc7322039", "console": [], "id": "TqIu", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Ch2 id=\"wait-510-failed-what-happened\"\u003EWait \u2014 5/10 failed. What happened?\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThat looks alarming; it mostly isn\u2019t. \u003Ccode\u003Edlt-131\u003C/code\u003E is a \u003Cstrong\u003Edeliberately hard\u003C/strong\u003E,\nSWE-bench-style task: a real reverted bug-fix (dlt PR #3431), ~100 steps across 8\nfiles, graded by \u003Cstrong\u003Eheld-out oracle tests the agent never sees\u003C/strong\u003E. Near-ceiling pass\nrates would mean the task is too easy to measure navigation at all. Every run in\n\u003Cem\u003Eboth\u003C/em\u003E arms correctly \u003Cstrong\u003Ediagnosed\u003C/strong\u003E the bug (accumulate-vs-replace, the two leak\nlayers); failures came down to whether the fix reached the destination-schema layer\nthe oracle checks \u2014 and how much thrash it took to get there.\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EA rep2 \u2014 not a real failure (grading artifact).\u003C/strong\u003E Hit a \u003Ccode\u003E_storage\u003C/code\u003E file-lock;\n  pytest then errored on \u003Cem\u003Eevery\u003C/em\u003E test in the locked run dir, which is exactly where\n  scoring runs \u2014 the only run with \u003Ccode\u003Epass_to_pass=FAIL\u003C/code\u003E / \u003Ccode\u003Eregression_ok=false\u003C/code\u003E.\n  Patch quality unknown. Excluding it, control solves \u003Cstrong\u003E2/4\u003C/strong\u003E.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EA rep4 \u2014 over-engineering rabbit-hole.\u003C/strong\u003E Dove in early (first edit at call ~11),\n  built a 3-part fix and even rewrote the oracle test\u2019s own assertions, landing on the\n  wrong layer. No regression (\u003Ccode\u003Ep2p=PASS\u003C/code\u003E) but wrong behavior (\u003Ccode\u003Ef2p=FAIL\u003C/code\u003E). Also the\n  priciest run ($13) and the one that tripped the usage-limit backstop.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EA rep5 \u2014 genuine incomplete fix\u003C/strong\u003E, second-highest edit churn.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ED rep2 \u0026amp; D rep3 \u2014 the low-dose tyf runs.\u003C/strong\u003E Both fired tyf only \u003Cstrong\u003E2\u00d7\u003C/strong\u003E and stopped\n  short of the destination-schema layer \u2014 fast, cheap, incomplete. These are exactly\n  the runs where treatment barely adopted the tool; behaviorally they look like baseline\n  A. \u003Cstrong\u003EEvery D run that used tyf \u22654\u00d7 passed.\u003C/strong\u003E\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ETakeaway.\u003C/strong\u003E Solve-rate at n=5 is noise (p=1.00), one control \u201cfail\u201d is a harness bug,\nand both treatment fails are \u003Cem\u003Elow-adoption\u003C/em\u003E runs rather than tyf-assisted-and-still-wrong.\nThe durable signal is behavioral \u2014 the grep\u2192tyf flip, fewer greps, tighter spreads \u2014\nnot the pass count. Corrected solve rate: \u003Cstrong\u003EA 2/4, D 3/5\u003C/strong\u003E. To firm it up: fix the\nstorage-lock scorer and re-grade A rep2, then add reps (~13/arm).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "26ded099e5b485cb8f5b2f56bcddd0e7", "console": [], "id": "Vxnm", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Chr /\u003E\n\u003Cblockquote\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EA note on pace.\u003C/strong\u003E Running these experiments takes a lot of time, patience,\nand tokens/money \u2014 each cell is a full ~100-step headless Opus session, run\nmany times over. More results are coming, but they accrue slowly. The above is\none task\u2019s worth of the picture, not the final word.\u003C/span\u003E\n\u003C/blockquote\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.23.13", "script_metadata_hash": null}, "version": "1"},
